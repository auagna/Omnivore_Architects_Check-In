services:
  - type: web
    name: omnivore-architects-check-in
    runtime: node
    plan: free
    buildCommand: npm config set fetch-retries 5 && npm config set fetch-retry-mintimeout 20000 && npm config set fetch-retry-maxtimeout 120000 && npm install --no-audit --no-fund && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: EVENT_CAPACITY
        value: "60"
