services:
  - type: web
    name: omnivore-architects-check-in
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_PIN
        sync: false
      - key: EVENT_CAPACITY
        value: "60"
